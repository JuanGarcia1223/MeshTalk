syntax = "proto3";

import "chat.proto";

message Envelope {
  enum Type {
    CHAT          = 0;
    FILE_OFFER    = 1;
    FILE_CHUNK    = 2;
    FILE_COMPLETE = 3;
  }

  Type type = 1;

  oneof payload {
    ChatMessage  chat          = 2;
    FileOffer    file_offer    = 3;
    FileChunk    file_chunk    = 4;
    FileComplete file_complete = 5;
  }

  // v2 E2E fields — leave empty for now
  bytes nonce      = 10;
  bytes ciphertext = 11;
}
