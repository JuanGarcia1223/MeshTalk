syntax = "proto3";

import "chat.proto";

message DeliveryAck {
  string msg_id = 1;
}

message HandshakePayload {
  bytes ed25519_pk = 1;  // sender's long-term identity public key (32 bytes)
  bytes x25519_pk  = 2;  // sender's ephemeral X25519 public key (32 bytes)
  bytes signature  = 3;  // Ed25519 sig of x25519_pk using ed25519_sk (64 bytes)
}

message InfoRequest {
  string from_user = 1;
  uint32 requester_tcp_port = 2;  // so responder can reply on outbound connection
}

message InfoEntryMsg {
  string key = 1;
  string value = 2;
}

message InfoResponse {
  string from_user = 1;
  repeated InfoEntryMsg entries = 2;
}

message Envelope {
  enum Type {
    CHAT          = 0;
    FILE_OFFER    = 1;
    FILE_CHUNK    = 2;
    FILE_COMPLETE = 3;
    HANDSHAKE     = 4;
    DELIVERY_ACK  = 5;
    INFO_REQUEST  = 6;
    INFO_RESPONSE = 7;
    ENCRYPTED     = 8;  // Outer wrapper for ciphertext payloads (inner type in decrypted bytes)
  }

  Type type = 1;

  oneof payload {
    ChatMessage      chat          = 2;
    FileOffer        file_offer    = 3;
    FileChunk        file_chunk    = 4;
    FileComplete     file_complete = 5;
    HandshakePayload handshake     = 6;
    DeliveryAck      delivery_ack  = 7;
    InfoRequest      info_request  = 8;
    InfoResponse     info_response = 9;
  }

  // v2 E2E fields — leave empty for now
  bytes nonce      = 10;
  bytes ciphertext = 11;
}
